services:
  certpatrol:
    build: .
    volumes:
      - certpatrol-data:/data
    ports:
      - "8080:8080"
    environment:
      SECRET_KEY: "replace-this-with-a-secure-key"
      MANAGER_HOST: "0.0.0.0"      # Bind to all interfaces
      MANAGER_PORT: "8080"         # Port inside the container
      MANAGER_DEBUG: "True"       # Optional: enable debug mode
      DATABASE_PATH: "/data/"
      MAX_CONCURRENT_SEARCHES: "10"

volumes:
  certpatrol-data:
