services:
  certpatrol:
    build: .
    container_name: certpatrol
    restart: unless-stopped

    ports:
      - "8080:8080"

    volumes:
      - certpatrol-data:/data

    environment:
      SECRET_KEY: "change-this-secret-key"
      MANAGER_HOST: "0.0.0.0"
      MANAGER_PORT: "8080"
      MANAGER_DEBUG: "False"

volumes:
  certpatrol-data:
